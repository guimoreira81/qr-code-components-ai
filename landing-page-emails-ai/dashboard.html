<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - MailFlow</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">

    <div class="logo">
      ✉ MailFlow
    </div>

    <div class="header-buttons">

      <a href="index.html">

        <button class="btn-secondary">
          Home
        </button>

      </a>

    </div>

  </header>

  <section class="dashboard-preview full-dashboard">

    <aside class="sidebar">

      <button class="compose-btn">
        + Novo Email
      </button>

      <ul>

        <li class="active">
          Caixa de entrada
        </li>

        <li>
          Enviados
        </li>

        <li>
          Favoritos
        </li>

        <li>
          Spam
        </li>

      </ul>

    </aside>

    <div class="mail-list">

      <div class="search-bar">

        <input
          type="text"
          placeholder="Buscar emails..."
        >

      </div>

      <div class="email active-email">

        <strong>Equipe MailFlow</strong>

        <span>Bem-vindo à plataforma</span>

        <small>Agora</small>

      </div>

      <div class="email">

        <strong>Suporte</strong>

        <span>Atualização da sua conta</span>

        <small>Ontem</small>

      </div>

    </div>

    <div class="mail-view">

      <h2>
        Bem-vindo à plataforma
      </h2>

      <div class="mail-user">

        <div class="avatar">
          MF
        </div>

        <div>

          <strong>
            Equipe MailFlow
          </strong>

          <p>
            para você
          </p>

        </div>

      </div>

      <div class="mail-content">

        <div class="line"></div>
        <div class="line"></div>
        <div class="line short"></div>

      </div>

    </div>

  </section>

</body>
</html>
