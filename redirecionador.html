<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Acesso</title>

  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --card: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: #334155;
      --primary: #38bdf8;
      --primary-dark: #0284c7;
      --shadow: rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 2rem;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.14), transparent 32rem),
        var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(100%, 58rem);
    }

    .intro {
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .intro h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
    }

    .intro p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    .painel {
      display: flex;
      gap: 1rem;
      justify-content: center;
      align-items: stretch;
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 1rem;
      background: var(--panel);
      box-shadow: 0 1rem 2.5rem var(--shadow);
      overflow-x: auto;
    }

    .botao-acesso {
      width: 13rem;
      min-width: 13rem;
      display: grid;
      justify-items: center;
      gap: 0.75rem;
      padding: 1.25rem 1rem;
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      background: var(--card);
      color: var(--text);
      text-align: center;
      text-decoration: none;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .botao-acesso:hover,
    .botao-acesso:focus-visible {
      transform: translateY(-0.25rem);
      border-color: var(--primary);
      background: #243449;
      box-shadow: 0 0.75rem 1.5rem rgba(56, 189, 248, 0.18);
      outline: none;
    }

    .botao-acesso img {
      width: 4.5rem;
      height: 4.5rem;
      padding: 0.9rem;
      border-radius: 50%;
      background: var(--primary-dark);
    }

    .botao-acesso span {
      display: block;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .botao-acesso small {
      display: block;
      margin-top: 0.25rem;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.4;
    }

    @media (max-width: 36rem) {
      body {
        padding: 1rem;
      }

      .painel {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="intro" aria-labelledby="titulo">
      <h1 id="titulo">Painel de Acesso</h1>
      <p>Escolha uma das opções abaixo para acessar as páginas correspondentes.</p>
    </section>

        target="_blank"

</body>
</html>
